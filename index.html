<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diego Amorim TECH Goulart</title>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            color: white;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1486312338219-ce68d2c6f44d?w=1920&q=80');
            background-size: cover;
            background-position: center;
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.3s;
            border: 2px solid #e74c3c;
            font-family: 'Roboto', sans-serif;
        }
        
        .btn:hover {
            background-color: transparent;
            color: #e74c3c;
        }
        
        .btn-outline {
            background-color: transparent;
            color: #e74c3c;
        }
        
        .btn-outline:hover {
            background-color: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Diego Amorim TECH Goulart</h1>
    <p>Redator especializado em cobertura de tecnologia, hardware, games e inteligência artificial. Cientista Social formado pela UFG com mais de 4 anos de experiência em redação para portais de tecnologia.</p>
    
    <div class="btn-container">
        <a href="#artigos" class="btn">Ver Artigos</a>
        <a href="#contato" class="btn btn-outline">Entrar em Contato</a>
    </div>
</body>
</html>
